<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" stroke="url(#accent)" stroke-width="2"/>
  
  <!-- Portfolio briefcase emoji - MAIOR -->
  <g transform="translate(50, 50) scale(0.8)">
    <!-- Briefcase body -->
    <rect x="-25" y="-10" width="50" height="30" rx="4" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
    
    <!-- Briefcase handle -->
    <rect x="-12" y="-15" width="24" height="5" rx="2.5" fill="#fbbf24" stroke="#92400e" stroke-width="1.5"/>
    
    <!-- Briefcase details -->
    <rect x="-20" y="-3" width="40" height="2.5" fill="#92400e"/>
    <rect x="-20" y="2" width="40" height="2.5" fill="#92400e"/>
    <rect x="-20" y="7" width="40" height="2.5" fill="#92400e"/>
    
    <!-- Portfolio icon - MAIOR -->
    <circle cx="0" cy="-5" r="4" fill="#8b5cf6"/>
    <path d="M-3,-8 L3,-8 L3,-2 L-3,-2 Z" fill="#ffffff"/>
  </g>
  
  <!-- Glow effect -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="48;52;48" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg> 